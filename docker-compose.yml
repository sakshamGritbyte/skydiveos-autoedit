# Single-VM deployment: API + Celery worker + Redis on one box.
# API and worker SHARE the `jobs` volume (the worker must see uploaded footage) and
# the SAME Redis. Bring it up with:  docker compose up -d --build
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  api:
    build: .
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      JOBS_ROOT: /data/jobs
    volumes:
      - jobs:/data/jobs            # api writes uploaded footage here
    ports:
      - "8000:8000"
    depends_on: [redis]
    restart: unless-stopped

  worker:
    build: .
    # --concurrency=2: at most 2 jumps process at once (each pegs CPU). Drop to 1 to
    # keep the API snappier during heavy jobs.
    command: celery -A api.celery_app.celery_app worker -l info --concurrency=2
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      JOBS_ROOT: /data/jobs
    volumes:
      - jobs:/data/jobs            # SAME volume — worker reads that footage
    depends_on: [redis]
    restart: unless-stopped

volumes:
  jobs:
